<!DOCTYPE html>
<html>
<body>
<h3>Diffie-Hellman</h3>
<input id="p" placeholder="Prime input">
<input id="g" placeholder="g">
<input id="a" placeholder="Alice">
<input id="b" placeholder="Bob">
<button onclick="run()">Run</button>
<pre id="o"></pre>

<script>
const mp=(b,e,m)=>{let r=1;b%=m;while(e>0){if(e&1)r=r*b%m;e>>=1;b=b*b%m;}return r}
const prime=n=>{if(n<2)return false;for(let i=2;i*i<=n;i++)if(n%i===0)return false;return true}

function run(){
 let s=document.getElementById("p").value
 if(!s)return o.textContent="⚠ Empty input"
 let p=/^\d+$/.test(s)?+s:[...s].reduce((a,c)=>a+c.charCodeAt(0),0)
 if(!prime(p)) return o.textContent=`⚠ p=${p} not prime`
 let g=+document.getElementById("g").value,a=+document.getElementById("a").value,b=+document.getElementById("b").value
 let A=mp(g,a,p),B=mp(g,b,p)
 o.textContent=`Input:${s}\np=${p}\nAlice:${A}\nBob:${B}\nKey:${mp(B,a,p)}`
}
</script>
</body>
</html>
